<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mankuke Day Care — Photo Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#e8f5f0 0%,#f0f9f5 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:#fff;border-radius:16px;padding:2.5rem;max-width:440px;width:100%;box-shadow:0 8px 32px rgba(15,110,86,.15);}
.logo-row{text-align:center;margin-bottom:1.5rem;}
.logo-row h1{font-size:20px;color:#085041;font-weight:800;}
.logo-row p{font-size:13px;color:#666;margin-top:4px;}

#loginBox label{font-size:13px;font-weight:600;color:#3a5a50;display:block;margin-bottom:6px;}
#loginBox input{width:100%;border:1px solid #c8e8dc;border-radius:8px;padding:11px 14px;font-size:15px;margin-bottom:14px;}
#loginBox button{width:100%;background:#0F6E56;color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
#loginError{color:#E63946;font-size:13px;margin-bottom:10px;display:none;}

#uploadBox{display:none;}
#uploadBox h2{font-size:16px;color:#085041;margin-bottom:14px;}
.drop-zone{border:2px dashed #c8e8dc;border-radius:12px;padding:2.5rem 1rem;text-align:center;cursor:pointer;background:#f8fffe;margin-bottom:16px;}
.drop-zone:hover{background:#f0f9f5;border-color:#1D9E75;}
.drop-zone p{font-size:14px;color:#666;}
.drop-zone .icon{font-size:32px;margin-bottom:8px;}
input[type=file]{display:none;}

#preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
#preview img{width:100%;height:80px;object-fit:cover;border-radius:8px;}

.status{font-size:13px;padding:10px;border-radius:8px;margin-bottom:14px;display:none;}
.status.success{background:#E1F5EE;color:#085041;display:block;}
.status.loading{background:#FFF3CD;color:#856404;display:block;}
.status.error{background:#FFE3E3;color:#a61b29;display:block;}

.uploaded-list{margin-top:1rem;}
.uploaded-item{display:flex;align-items:center;gap:10px;background:#f0f9f5;border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:#085041;word-break:break-all;}
.uploaded-item img{width:40px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0;}
.copy-btn{background:#0F6E56;color:#fff;border:none;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;flex-shrink:0;margin-left:auto;}

.logout{text-align:center;margin-top:1rem;}
.logout a{font-size:12px;color:#999;cursor:pointer;}
</style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <h1>Mankuke Day Care</h1>
    <p>Photo Upload — Admin Access</p>
  </div>

  <div id="loginBox">
    <p id="loginError">Incorrect password. Please try again.</p>
    <label>Admin Password</label>
    <input type="password" id="pwInput" placeholder="Enter password">
    <button onclick="checkLogin()">Log in</button>
  </div>

  <div id="uploadBox">
    <h2>Upload a photo</h2>
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📷</div>
      <p>Tap here to choose a photo<br>from your gallery or camera</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">

    <div id="preview"></div>
    <div id="status" class="status"></div>

    <div class="uploaded-list" id="uploadedList"></div>

    <div class="logout"><a onclick="logout()">Log out</a></div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "@Mankuke2020";
const CLOUD_NAME = "dbugr3nmr";
const UPLOAD_PRESET = "Manku";

function checkLogin(){
  const val = document.getElementById('pwInput').value;
  if(val === ADMIN_PASSWORD){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('uploadBox').style.display = 'block';
    sessionStorage.setItem('mankuke_admin','yes');
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function logout(){
  sessionStorage.removeItem('mankuke_admin');
  location.reload();
}

window.onload = function(){
  if(sessionStorage.getItem('mankuke_admin') === 'yes'){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('uploadBox').style.display = 'block';
  }
}

function handleFiles(files){
  const statusEl = document.getElementById('status');
  const preview = document.getElementById('preview');
  preview.innerHTML = '';

  for(let i=0; i<files.length; i++){
    uploadFile(files[i]);
  }
}

function uploadFile(file){
  const statusEl = document.getElementById('status');
  statusEl.className = 'status loading';
  statusEl.style.display = 'block';
  statusEl.textContent = 'Uploading ' + file.name + '...';

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', UPLOAD_PRESET);

  fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', {
    method: 'POST',
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    if(data.secure_url){
      statusEl.className = 'status success';
      statusEl.textContent = '✓ Photo uploaded successfully!';
      addToList(data.secure_url);
    } else {
      statusEl.className = 'status error';
      statusEl.textContent = 'Upload failed: ' + (data.error ? data.error.message : 'Unknown error');
    }
  })
  .catch(err => {
    statusEl.className = 'status error';
    statusEl.textContent = 'Upload failed. Check your internet connection.';
  });
}

function addToList(url){
  const list = document.getElementById('uploadedList');
  const item = document.createElement('div');
  item.className = 'uploaded-item';
  item.innerHTML = '<img src="'+url+'"><span>Photo uploaded ✓</span><button class="copy-btn" onclick="copyLink(this,\''+url+'\')">Copy link</button>';
  list.prepend(item);
}

function copyLink(btn, url){
  navigator.clipboard.writeText(url);
  btn.textContent = 'Copied!';
  setTimeout(()=>{ btn.textContent = 'Copy link'; }, 1500);
}
</script>
</body>
</html>
